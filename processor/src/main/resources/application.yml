server:
   port: 8082
spring:
  application:
     name: "AsyncProcessor"
  datasource:
    url: jdbc:mysql://localhost:3306/zapier
    username: root
    password: 
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  sql:
    init:
      mode: always
  kafka:
     bootstrap-servers: localhost:9092
     topic:
       zap-events: zap-events




